services:
  - type: web
    name: intelliquest-backend
    env: node
    repo: https://github.com/YOUR_USERNAME/IntelliQuest.git
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: static
    name: intelliquest-frontend
    env: node
    repo: https://github.com/YOUR_USERNAME/IntelliQuest.git
    rootDir: frontend/IntelliQuest
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
